name: Process Uploaded Images

on:
  push:
    paths:
      - "originals/**"

permissions:
  contents: write

concurrency:
  group: process-images-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sharp
        run: |
          npm init -y
          npm install sharp

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ' ')
          echo "FILES=$FILES" >> $GITHUB_OUTPUT

      - name: Skip if no relevant files
        if: steps.changed.outputs.FILES == ''
        run: echo "No changed files. Skipping."

      - name: Convert only changed images
        if: steps.changed.outputs.FILES != ''
        run: |
          node process-images.js ${{ steps.changed.outputs.FILES }}

      - name: Update files.json
        if: steps.changed.outputs.FILES != ''
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const FILE_PATH = path.join(process.cwd(), 'images', 'files.json');

          if (!fs.existsSync(FILE_PATH)) {
            fs.writeFileSync(FILE_PATH, JSON.stringify({}, null, 2));
          }

          const data = JSON.parse(fs.readFileSync(FILE_PATH, 'utf-8'));

          const now = Date.now();

          const repo = process.env.GITHUB_REPOSITORY.split('/')[1];
          const owner = process.env.GITHUB_REPOSITORY.split('/')[0];
          const ownerLower = owner.toLowerCase();

          const baseUrl = `https://${ownerLower}.github.io/${repo}`;

          const imagesDir = path.join(process.cwd(), 'images');
          const files = fs.readdirSync(imagesDir).filter(f => f.endsWith('.webp'));

          files.forEach((file, index) => {
            const key = now + index;

            data[key] = {
              path: `${baseUrl}/images/${file}`,
              name: file || `${now}.webp`,
              meta: {}
            };
          });

          fs.writeFileSync(FILE_PATH, JSON.stringify(data, null, 2));
          console.log("files.json updated with GitHub Pages URLs");
          EOF

      - name: Commit processed images + metadata
        if: steps.changed.outputs.FILES != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add images

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add processed images + metadata"
            git push
          fi